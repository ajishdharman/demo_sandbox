name: Build Deploy Trigger Tests

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: echo "Unit tests passed"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deployment
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Wait for application to become live
        run: |
          echo "Waiting for deployment..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://demo-sandbox-gmqg.onrender.com)
            if [ "$STATUS" -eq 200 ]; then
              echo "Application is live!"
              exit 0
            fi
            echo "Not ready yet... retrying in 10 seconds"
            sleep 10
          done
          echo "Deployment timeout"
          exit 1

  trigger-tests:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Playwright tests in demo_playwright
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.PLAYWRIGHT_TRIGGER_TOKEN }}" \
          -H "Content-Type: application/json" \
          https://api.github.com/repos/ajishdharman/demo_playwright/dispatches \
          -d '{"event_type":"run-playwright-tests"}'

      - name: Confirm dispatch sent
        run: echo "Playwright test trigger sent"